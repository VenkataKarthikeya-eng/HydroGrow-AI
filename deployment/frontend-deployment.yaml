apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydrogrow-frontend
  namespace: default
  labels:
    app: hydrogrow-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hydrogrow-frontend
  template:
    metadata:
      labels:
        app: hydrogrow-frontend
    spec:
      containers:
      - name: frontend
        image: hydrogrow/frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hydrogrow-frontend-svc
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: hydrogrow-frontend
