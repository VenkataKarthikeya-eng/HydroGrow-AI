apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydrogrow-backend
  namespace: default
  labels:
    app: hydrogrow-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hydrogrow-backend
  template:
    metadata:
      labels:
        app: hydrogrow-backend
    spec:
      containers:
      - name: backend
        image: hydrogrow/backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: API_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: hydrogrow-secrets
              key: database-url
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: hydrogrow-secrets
              key: jwt-secret-key
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hydrogrow-backend-svc
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: hydrogrow-backend
