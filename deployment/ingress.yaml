apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hydrogrow-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - hydrogrow.ai
    secretName: hydrogrow-tls-cert
  rules:
  - host: hydrogrow.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hydrogrow-frontend-svc
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: hydrogrow-backend-svc
            port:
              number: 8000
