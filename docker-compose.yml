version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hydrogrow_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hydrogrow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_here}
      POSTGRES_DB: ${POSTGRES_DB:-hydrogrow_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hydrogrow_user} -d ${POSTGRES_DB:-hydrogrow_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hydrogrow_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hydrogrow_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hydrogrow_user}:${POSTGRES_PASSWORD:-secure_password_here}@postgres:5432/${POSTGRES_DB:-hydrogrow_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-hydrogrow_production_jwt_secret_key}
      API_ENV: production
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hydrogrow_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hydrogrow_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - hydrogrow_network

volumes:
  postgres_data:
    driver: local

networks:
  hydrogrow_network:
    driver: bridge
